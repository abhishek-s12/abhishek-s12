name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"   # regenerates every 6 hours
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake SVG/GIF
        uses: Platane/snk@v3
        with:
          github_user_name: abhishek-s12
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#a78bfa&color_dots=#1e293b,#38bdf8,#6366f1,#a78bfa,#ec4899

      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
